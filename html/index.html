<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мини-приложение Telegram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        
        h1 {
            font-size: 2em;
            margin-bottom: 20px;
            margin-top: 40px;
        }
        
        .counter-card {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
        }
        
        .counter {
            font-size: 3em;
            font-weight: bold;
            margin: 20px 0;
        }
        
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .user-info {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.9em;
        }
        
        .tg-button {
            background: #0088cc;
            color: white;
            margin-top: 20px;
        }
        
        .tg-button:hover {
            background: #006699;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Мини-приложение ✨</h1>
        
        <div class="counter-card">
            <p>Счётчик кликов:</p>
            <div class="counter" id="counter">0</div>
            <button onclick="incrementCounter()">➕ Нажми меня</button>
            <button onclick="resetCounter()">🔄 Сбросить</button>
        </div>
        
        <div class="user-info" id="userInfo">
            Загрузка данных пользователя...
        </div>
        
        <button class="tg-button" onclick="sendTelegramData()">
            📤 Отправить данные в Telegram
        </button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Инициализация WebApp Telegram
        const tg = window.Telegram.WebApp;
        
        // Показываем, что приложение готово
        tg.ready();
        
        // Расширяем на всё окно
        tg.expand();
        
        // Данные пользователя
        let counter = 0;
        
        // Отображаем информацию о пользователе
        function displayUserInfo() {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('userInfo').innerHTML = `
                    <strong>👤 Информация о вас:</strong><br>
                    ID: ${user.id}<br>
                    Имя: ${user.first_name} ${user.last_name || ''}<br>
                    ${user.username ? `Username: @${user.username}` : ''}<br>
                    Язык: ${user.language_code || 'не указан'}
                `;
            } else {
                document.getElementById('userInfo').innerHTML = '⚡ Режим предпросмотра (без данных пользователя)';
            }
        }
        
        // Функция для счетчика
        function incrementCounter() {
            counter++;
            document.getElementById('counter').innerText = counter;
            
            // Вибрация (если доступно)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }
        
        function resetCounter() {
            counter = 0;
            document.getElementById('counter').innerText = counter;
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('error');
            }
        }
        
        // Отправка данных в Telegram
        function sendTelegramData() {
            const data = {
                counter: counter,
                timestamp: new Date().toISOString(),
                action: 'counter_updated'
            };
            
            // Отправляем данные в бот
            tg.sendData(JSON.stringify(data));
            
            // Показываем всплывающее уведомление
            tg.showAlert(`Отправлено! Счётчик: ${counter}`);
        }
        
        // Настройка главной кнопки (внизу экрана)
        tg.MainButton.setText('Закрыть приложение');
        tg.MainButton.onClick(() => {
            tg.close();
        });
        tg.MainButton.show();
        
        // Запускаем отображение данных
        displayUserInfo();
        
        // Обработка темы Telegram
        if (tg.colorScheme === 'dark') {
            document.body.style.background = 'linear-gradient(135deg, #1e1e2f 0%, #2a2a3e 100%)';
        }
    </script>
</body>
</html>

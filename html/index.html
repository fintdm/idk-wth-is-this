<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Telegram Mini App</title>
    
    <!-- ПРАВИЛЬНЫЙ SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        
        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            margin: 10px;
            cursor: pointer;
        }
        
        .user-info {
            margin: 20px 0;
            padding: 20px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Telegram Mini App</h1>
        
        <div class="user-info" id="userInfo">
            Загрузка...
        </div>
        
        <button onclick="sendData()">Отправить данные боту</button>
        <button onclick="closeApp()">Закрыть</button>
    </div>
    
    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        
        // Сообщаем Telegram, что приложение готово
        tg.ready();
        
        // Растягиваем на весь экран
        tg.expand();
        
        // Получаем данные пользователя
        const user = tg.initDataUnsafe?.user;
        
        if (user) {
            document.getElementById('userInfo').innerHTML = `
                <p>👤 Имя: ${user.first_name || 'Гость'}</p>
                <p>🆔 ID: ${user.id || 'Неизвестно'}</p>
                <p>🌍 Язык: ${user.language_code || 'ru'}</p>
            `;
        } else {
            document.getElementById('userInfo').innerHTML = '<p>Данные пользователя недоступны</p>';
        }
        
        // Функция отправки данных боту
        function sendData() {
            tg.sendData(JSON.stringify({
                action: 'button_click',
                message: 'Привет от мини-приложения!',
                timestamp: Date.now()
            }));
            
            tg.showPopup({
                title: 'Успех',
                message: 'Данные отправлены боту!',
                buttons: [{type: 'ok'}]
            });
        }
        
        // Функция закрытия приложения
        function closeApp() {
            tg.close();
        }
        
        // Показываем основную кнопку (опционально)
        tg.MainButton.setText('Главная');
        tg.MainButton.onClick(() => {
            sendData();
        });
        tg.MainButton.show();
        
        console.log('Mini App initialized');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
        }
        
        .button-grid {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-primary {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
        
        .btn-secondary {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            color: var(--tg-theme-text-color, #000000);
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 8px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--tg-theme-button-color, #2481cc);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        h2 {
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Инициализация Telegram Web App -->
        <script>
            // Получаем объект Telegram Web App
            const tg = window.Telegram.WebApp;
            
            // Сообщаем Telegram, что приложение готово
            tg.ready();
            
            // Расширяем приложение на весь экран
            tg.expand();
            
            // Показываем кнопку "Назад" если нужно
            tg.enableClosingConfirmation();
            
            // Получаем данные пользователя из Telegram
            const user = tg.initDataUnsafe?.user;
            
            // Отображаем информацию о пользователе
            if (user) {
                document.getElementById('userName').textContent = user.first_name || 'Гость';
                document.getElementById('userAvatar').textContent = (user.first_name?.[0] || 'U').toUpperCase();
            }
            
            // Функция отправки данных боту
            function sendToBot(data) {
                tg.sendData(JSON.stringify(data));
                tg.showPopup({
                    title: 'Успех',
                    message: 'Данные отправлены боту!',
                    buttons: [{type: 'ok'}]
                });
            }
            
            // Делаем функции глобальными для вызова из HTML
            window.sendToBot = sendToBot;
        </script>
        
        <div class="header">
            <div class="user-info">
                <div class="avatar" id="userAvatar">U</div>
                <div>
                    <h1>Привет, <span id="userName">Пользователь</span>!</h1>
                    <p>Добро пожаловать в мини-приложение</p>
                </div>
            </div>
        </div>
        
        <div class="button-grid">
            <button class="btn btn-primary" onclick="sendToBot({action: 'button_click', button: 'Основная кнопка'})">
                🎯 Основное действие
            </button>
            
            <button class="btn btn-secondary" onclick="sendToBot({action: 'button_click', button: 'Вторичная кнопка'})">
                ⚡ Вторичное действие
            </button>
            
            <button class="btn btn-danger" onclick="tg.close()">
                ❌ Закрыть приложение
            </button>
        </div>
        
        <div class="card">
            <h2>📝 Отправить форму</h2>
            <form id="userForm" onsubmit="event.preventDefault(); submitForm()">
                <div class="form-group">
                    <label>Ваше имя</label>
                    <input type="text" id="userNameInput" placeholder="Введите имя" required>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="userEmail" placeholder="example@mail.com" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    📨 Отправить данные
                </button>
            </form>
        </div>
        
        <div class="card">
            <h2>ℹ️ Информация</h2>
            <p>Версия платформы: <span id="version"></span></p>
            <p>Цветовая схема: <span id="colorScheme"></span></p>
            <button class="btn btn-secondary" onclick="showPlatformInfo()" style="margin-top: 10px;">
                📱 Показать информацию
            </button>
        </div>
        
        <div id="status" class="status" style="display: none;"></div>
    </div>
    
    <script>
        // Отображаем информацию о платформе
        document.getElementById('version').textContent = tg.version || 'unknown';
        document.getElementById('colorScheme').textContent = tg.colorScheme || 'light';
        
        // Функция отправки формы
        function submitForm() {
            const name = document.getElementById('userNameInput').value;
            const email = document.getElementById('userEmail').value;
            
            if (name && email) {
                sendToBot({
                    action: 'form_submit',
                    name: name,
                    email: email
                });
                
                // Очищаем форму
                document.getElementById('userNameInput').value = '';
                document.getElementById('userEmail').value = '';
            } else {
                tg.showAlert('Пожалуйста, заполните все поля!');
            }
        }
        
        // Функция показа информации о платформе
        function showPlatformInfo() {
            const info = `Платформа: ${tg.platform}\nВерсия: ${tg.version}\nЦветовая схема: ${tg.colorScheme}`;
            tg.showAlert(info);
        }
        
        // Адаптация под тему Telegram
        tg.onEvent('themeChanged', () => {
            document.body.style.backgroundColor = tg.themeParams.bg_color;
            document.body.style.color = tg.themeParams.text_color;
        });
        
        // Показываем кнопку "Главная" внизу экрана
        tg.MainButton.setText('Главная');
        tg.MainButton.onClick(() => {
            sendToBot({action: 'main_button', button: 'Главная кнопка'});
        });
        tg.MainButton.show();
    </script>
</body>
</html>
